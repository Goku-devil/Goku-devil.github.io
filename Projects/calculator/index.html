<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Gokulraj A S | Calculator</title>
	<link rel="shortcut icon" href="../../asserts/favIcon-Picsart-AiImageEnhancer.png" type="image/x-icon">

	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

	<link rel="stylesheet" href="style.css">
</head>
<body>

	<nav class="navbar" id="navbar">
		<div class="nav-content">
			<a href="https://goku-devil.github.io/portfolio/" class="logo"><span>Goku</span>lraj<span>.</span></a>

			<ul id="navMenu" class="nav-links">
				<li><a href="https://goku-devil.github.io/portfolio/" class="nav-link active">Home</a></li>
				<li><a href="https://goku-devil.github.io/portfolio/#projects" class="nav-link">Projects</a></li>
				<li><a href="https://goku-devil.github.io/portfolio/#about" class="nav-link">About</a></li>
				<li><a href="https://goku-devil.github.io/portfolio/#contact" class="nav-link">Contact</a></li>
			</ul>

			<div class="nav-actions">
				<button id="theme-toggle" type="button" aria-label="Toggle dark mode">
					<i class="fa-solid fa-moon"></i>
				</button>

				<button id="hamburger" class="hamburger" type="button" aria-label="Open navigation menu" aria-controls="navMenu" aria-expanded="false">
					<span></span>
					<span></span>
					<span></span>
				</button>
			</div>
		</div>
	</nav>

	<main class="app-wrapper" id="home">
		<section class="app-card" id="calculator">
			<h2>Calculator</h2>
			<p>This page now uses the same navbar and footer style as your Todo page.</p>

			<div class="calculator-app" aria-label="Calculator app">
				<input id="calcDisplay" class="calc-display" type="text" value="0" readonly aria-label="Calculator display">

				<div class="calc-grid">
					<button type="button" class="calc-btn action" data-action="clear">AC</button>
					<button type="button" class="calc-btn action" data-action="delete">DEL</button>
					<button type="button" class="calc-btn operator" data-value="%">%</button>
					<button type="button" class="calc-btn operator" data-value="/">/</button>

					<button type="button" class="calc-btn" data-value="7">7</button>
					<button type="button" class="calc-btn" data-value="8">8</button>
					<button type="button" class="calc-btn" data-value="9">9</button>
					<button type="button" class="calc-btn operator" data-value="*">*</button>

					<button type="button" class="calc-btn" data-value="4">4</button>
					<button type="button" class="calc-btn" data-value="5">5</button>
					<button type="button" class="calc-btn" data-value="6">6</button>
					<button type="button" class="calc-btn operator" data-value="-">-</button>

					<button type="button" class="calc-btn" data-value="1">1</button>
					<button type="button" class="calc-btn" data-value="2">2</button>
					<button type="button" class="calc-btn" data-value="3">3</button>
					<button type="button" class="calc-btn operator" data-value="+">+</button>

					<button type="button" class="calc-btn zero" data-value="0">0</button>
					<button type="button" class="calc-btn" data-value=".">.</button>
					<button type="button" class="calc-btn equals" data-action="equals">=</button>
				</div>
			</div>
		</section>
	</main>

	<footer class="site-footer" aria-label="Footer">
		<p>Made by Gokulraj A S | Calculator Project</p>
	</footer>

	<script src="script.js"></script>
</body>
</html>
