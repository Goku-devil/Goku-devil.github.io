<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Gokulraj A S | Weather</title>
	<link rel="shortcut icon" href="../../asserts/favIcon-Picsart-AiImageEnhancer.png" type="image/x-icon">

	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

	<link rel="stylesheet" href="style.css">
</head>
<body>

	<nav class="navbar" id="navbar">
		<div class="nav-content">
			<a href="https://goku-devil.github.io/portfolio/" class="logo"><span>Goku</span>lraj<span>.</span></a>

			<ul id="navMenu" class="nav-links">
				<li><a href="https://goku-devil.github.io/portfolio/" class="nav-link active">Home</a></li>
				<li><a href="https://goku-devil.github.io/portfolio/#projects" class="nav-link">Projects</a></li>
				<li><a href="https://goku-devil.github.io/portfolio/#about" class="nav-link">About</a></li>
				<li><a href="https://goku-devil.github.io/portfolio/#contact" class="nav-link">Contact</a></li>
			</ul>

			<div class="nav-actions">
				<button id="theme-toggle" type="button" aria-label="Toggle dark mode">
					<i class="fa-solid fa-moon"></i>
				</button>

				<button id="hamburger" class="hamburger" type="button" aria-label="Open navigation menu" aria-controls="navMenu" aria-expanded="false">
					<span></span>
					<span></span>
					<span></span>
				</button>
			</div>
		</div>
	</nav>

	<main class="app-wrapper" id="home">
		<section class="app-card" id="weather">
			<header class="weather-header">
				<h2>Weather Dashboard</h2>
				<p>Search any city to see live weather conditions.</p>
			</header>

			<form id="weatherForm" class="weather-form" autocomplete="off">
				<label for="cityInput" class="sr-only">City name</label>
				<div class="input-row">
					<input id="cityInput" name="city" type="text" placeholder="Enter city name (e.g. Chennai)" required>
					<button type="submit" id="searchBtn">
						<i class="fa-solid fa-magnifying-glass"></i>
						<span>Search</span>
					</button>
				</div>
			</form>

			<p id="statusMessage" class="status-message" aria-live="polite"></p>

			<article id="weatherResult" class="weather-result" hidden>
				<div class="result-main">
					<div>
						<h3 id="cityName">--</h3>
						<p id="weatherDescription">--</p>
					</div>
					<div class="temp-wrap">
						<p id="temperature">--</p>
						<p id="feelsLike">Feels like --</p>
					</div>
				</div>

				<div class="weather-metrics">
					<div class="metric-card">
						<p>Humidity</p>
						<strong id="humidity">--</strong>
					</div>
					<div class="metric-card">
						<p>Wind</p>
						<strong id="windSpeed">--</strong>
					</div>
					<div class="metric-card">
						<p>Pressure</p>
						<strong id="pressure">--</strong>
					</div>
					<div class="metric-card">
						<p>Updated</p>
						<strong id="updatedAt">--</strong>
					</div>
				</div>
			</article>
		</section>
	</main>

	<footer class="site-footer" aria-label="Footer">
		<p>Made by Gokulraj A S | Weather Project</p>
	</footer>

	<script src="script.js"></script>
</body>
</html>
